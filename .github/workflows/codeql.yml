name: CodeQL Advanced

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '27 4 * * 1'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.runner }}

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
            runner: ubuntu-latest
          - language: swift
            build-mode: manual
            runner: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Setup Swift
        if: matrix.language == 'swift'
        uses: SwiftyLab/setup-swift@v1
        with:
          swift-version: "6.2.3"
          development: true

      - name: Assert stable Swift toolchain
        if: matrix.language == 'swift'
        run: |
          SWIFT_VERSION="$(swift --version)"
          if printf '%s\n' "$SWIFT_VERSION" | grep -q 'DEVELOPMENT-SNAPSHOT'; then
            echo 'Unexpected development snapshot toolchain'
            exit 1
          fi

      - name: Build Swift package (manual)
        if: matrix.language == 'swift'
        run: MACOSX_DEPLOYMENT_TARGET=10.15 swift build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
