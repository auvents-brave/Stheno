name: _Apple Simulator Tests (Reusable)

on:
  workflow_call:
    inputs:
      workflow-name:
        required: true
        type: string
      scheme:
        required: true
        type: string
      sim-runtime-prefix:
        required: true
        type: string
      device-name-regex:
        required: false
        type: string
        default: ".*"

jobs:
  test:
    name: "${{ inputs.workflow-name }}"
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"
      - uses: SwiftyLab/setup-swift@v1
        with:
          swift-version: "6.2.3"
          development: true

      - name: Resolve simulator destination
        id: sim
        shell: bash
        env:
          RUNTIME_PREFIX: ${{ inputs.sim-runtime-prefix }}
          DEVICE_REGEX: ${{ inputs.device-name-regex }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json, os, re, subprocess, sys

          prefix = os.environ["RUNTIME_PREFIX"]  # ex: com.apple.CoreSimulator.SimRuntime.iOS
          pattern = re.compile(os.environ["DEVICE_REGEX"])

          data = json.loads(subprocess.check_output(
              ["xcrun", "simctl", "list", "devices", "available", "--json"], text=True))

          def runtime_ver(runtime_key):
            # runtime key format: com.apple.CoreSimulator.SimRuntime.iOS-18-2
            m = re.search(r'-(\d+)(?:-(\d+))?(?:-(\d+))?$', runtime_key)
            if not m:
              return (0, 0, 0)
            a = int(m.group(1))
            b = int(m.group(2) or 0)
            c = int(m.group(3) or 0)
            return (a, b, c)

          candidates = []
          for runtime_key, devices in data.get("devices", {}).items():
            if not runtime_key.startswith(prefix + "-"):
              continue
            rv = runtime_ver(runtime_key)
            for d in devices:
              if not d.get("isAvailable", False):
                continue
              name = d.get("name", "")
              if not pattern.search(name):
                continue
              candidates.append((rv, runtime_key, d["udid"], name))

          if not candidates:
            print("No simulator candidates found.", file=sys.stderr)
            sys.exit(1)

          candidates.sort(key=lambda x: x[0])
          chosen = candidates[-1]
          reason = "latest-available"

          rv, runtime_key, udid, name = chosen
          print(
              f"Using simulator: {name} | runtime={runtime_key} | udid={udid} "
              f"| reason={reason}"
          )

          out = open(os.environ["GITHUB_OUTPUT"], "a")
          out.write(f"destination=id={udid}\n")
          out.write(f"runtime_key={runtime_key}\n")
          out.close()
          PY

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          echo "Testing on simulator destination=${{ steps.sim.outputs.destination }} runtime=${{ steps.sim.outputs.runtime_key }}"
          xcodebuild -resolvePackageDependencies -scheme "${{ inputs.scheme }}" -toolchain swift IDEPackageSupportToolchainOverrideForManifestLoading=swift
          xcodebuild test \
            -scheme "${{ inputs.scheme }}" \
            -toolchain swift \
            IDEPackageSupportToolchainOverrideForManifestLoading=swift \
            -destination "${{ steps.sim.outputs.destination }}" \
            -skipPackagePluginValidation \
            -skipMacroValidation
