name: Windows
on: { push: { branches: [main] }, pull_request: {}, workflow_dispatch: {} }

permissions:
  contents: read

concurrency:
  group: ci-${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SWIFT_WINDOWS_INSTALLER_URL: "https://download.swift.org/swift-6.2.3-release/windows10/swift-6.2.3-RELEASE/swift-6.2.3-RELEASE-windows10.exe"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        runner: [windows-2025]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Swift 6.2.3 silently
        shell: pwsh
        run: |
          curl -LO https://aka.ms/vs/17/release/vs_buildtools.exe
          ./vs_buildtools.exe `
            --quiet `
            --wait `
            --norestart `
            --nocache `
            --installPath C:\BuildTools `
            --add Microsoft.VisualStudio.Component.Windows11SDK.22000 `
            --add Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            --add Microsoft.VisualStudio.Component.VC.Tools.ARM64
          Invoke-WebRequest -Uri $env:SWIFT_WINDOWS_INSTALLER_URL `
            -OutFile swift-installer.exe
          Start-Process -FilePath .\swift-installer.exe -ArgumentList "/quiet" -Wait
          $swiftExe = Get-ChildItem `
            -Path "C:\Program Files\Swift", "C:\Library\Developer\Toolchains" `
            -Filter swift.exe `
            -Recurse `
            -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          if (-not $swiftExe) {
            throw "swift.exe not found after installation"
          }
          $installPath = Split-Path -Path $swiftExe -Parent
          $installPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:Path += ";$installPath"
          [System.Environment]::SetEnvironmentVariable("PATH", $env:Path, [System.EnvironmentVariableTarget]::Process)
          swift --version

      - name: Check Swift Version
        shell: pwsh
        run: swift --version

      - shell: pwsh
        run: swift build -c release

      - shell: pwsh
        run: swift test
