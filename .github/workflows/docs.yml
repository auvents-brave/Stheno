name: Documentation
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Build DocC archive
        run: |
          xcodebuild docbuild \
            -scheme "Stheno" \
            -destination "generic/platform=macOS" \
            -derivedDataPath "$PWD/.derivedData" \
            MACOSX_DEPLOYMENT_TARGET=10.15

      - name: Export DocC static site
        run: |
          ARCHIVE_PATH="$(find "$PWD/.derivedData" -type d -name "Stheno.doccarchive" -print -quit)"
          if [ -z "$ARCHIVE_PATH" ]; then
            echo "Stheno.doccarchive not found"
            exit 1
          fi
          xcrun docc process-archive transform-for-static-hosting "$ARCHIVE_PATH" \
            --output-path "$PWD/docs" \
            --hosting-base-path "Stheno"

      - name: Normalize base path for GitHub Pages
        run: |
          INDEX="$PWD/docs/index.html"
          if grep -q 'var baseUrl = "/"' "$INDEX"; then
            sed -i '' 's#var baseUrl = "/"#var baseUrl = "/Stheno/"#g' "$INDEX"
            sed -i '' 's#href="/#href="/Stheno/#g' "$INDEX"
            sed -i '' 's#src="/#src="/Stheno/#g' "$INDEX"
          fi

      - name: Set root redirect to module docs
        run: |
          cat > "$PWD/docs/index.html" <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=/Stheno/documentation/stheno/">
              <script>window.location.replace("/Stheno/documentation/stheno/")</script>
              <title>Stheno Documentation</title>
            </head>
            <body>
              Redirecting to <a href="/Stheno/documentation/stheno/">Stheno documentation</a>...
            </body>
          </html>
          HTML

      - name: Validate docs entrypoint
        run: |
          if [ ! -f "$PWD/docs/documentation/stheno/index.html" ]; then
            echo "Missing docs/documentation/stheno/index.html"
            find "$PWD/docs" -maxdepth 3 -type f | sed -n '1,120p'
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
