name: Documentation
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Build DocC archive
        run: |
          xcodebuild docbuild \
            -scheme "Stheno" \
            -destination "generic/platform=macOS" \
            -derivedDataPath "$PWD/.derivedData" \
            MACOSX_DEPLOYMENT_TARGET=10.15

      - name: Export DocC static site
        run: |
          ARCHIVE_PATH="$(find "$PWD/.derivedData" -type d -name "Stheno.doccarchive" -print -quit)"
          if [ -z "$ARCHIVE_PATH" ]; then
            echo "Stheno.doccarchive not found"
            exit 1
          fi
          xcrun docc process-archive transform-for-static-hosting "$ARCHIVE_PATH" \
            --output-path "$PWD/docs" \
            --hosting-base-path "Stheno"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
