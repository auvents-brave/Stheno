name: SonarCloud

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@v1
        with:
          swift-version: "6.2.3"
          development: true

      - name: Build
        run: swift build -c release

      - name: Test with coverage
        run: swift test --enable-code-coverage

      - name: Convert coverage to Sonar generic XML
        shell: bash
        run: |
          set -euo pipefail

          BIN_DIR="$(swift build --show-bin-path)"
          BUILD_DIR="${BIN_DIR%/debug}"

          PROFDATA="$(find "$BUILD_DIR" -type f -name "default.profdata" | head -n 1)"
          TEST_BIN="$(find "$BUILD_DIR" -type f -perm -111 | grep -E '(PackageTests\.xctest|Tests\.xctest|Tests)$' | head -n 1)"

          if [ -z "${PROFDATA:-}" ]; then
            echo "default.profdata not found"
            exit 1
          fi

          if [ -z "${TEST_BIN:-}" ]; then
            echo "test binary not found"
            exit 1
          fi

          llvm-cov export \
            -format=lcov \
            -instr-profile "$PROFDATA" \
            "$TEST_BIN" > coverage.lcov

          python3 - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from collections import defaultdict

          workspace = os.path.abspath(os.environ.get("GITHUB_WORKSPACE", "."))
          files = defaultdict(dict)
          current = None

          with open("coverage.lcov", "r", encoding="utf-8") as f:
              for raw in f:
                  line = raw.strip()
                  if line.startswith("SF:"):
                      p = os.path.abspath(line[3:])
                      if p.startswith(workspace + os.sep):
                          current = os.path.relpath(p, workspace)
                      else:
                          current = None
                  elif line.startswith("DA:") and current:
                      ln, hits = line[3:].split(",")[:2]
                      ln_i = int(ln)
                      hits_i = int(hits)
                      prev = files[current].get(ln_i, 0)
                      files[current][ln_i] = max(prev, hits_i)

          root = ET.Element("coverage", version="1")
          for path in sorted(files.keys()):
              file_el = ET.SubElement(root, "file", path=path)
              for ln in sorted(files[path].keys()):
                  ET.SubElement(
                      file_el,
                      "lineToCover",
                      lineNumber=str(ln),
                      covered="true" if files[path][ln] > 0 else "false",
                  )

          ET.ElementTree(root).write("coverage.xml", encoding="utf-8", xml_declaration=True)
          PY

- name: SonarCloud Scan
  uses: sonarsource/sonarcloud-github-action@v3
  env:
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
