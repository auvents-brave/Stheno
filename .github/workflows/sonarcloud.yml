name: SonarCloud
on: { push: { branches: [main] }, pull_request: {}, workflow_dispatch: {} }

concurrency:
  group: ci-${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04]
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: SwiftyLab/setup-swift@v1
        with:
          swift-version: "6.2.3"
          development: true

      - name: Build (same as linux.yml)
        run: swift build -c release

      - name: Test with coverage (linux)
        run: swift test --enable-code-coverage

      - name: Convert llvm-cov to Sonar generic coverage.xml
        shell: bash
        run: |
          set -euo pipefail

          BIN_DIR="$(swift build --show-bin-path)"
          BUILD_DIR="${BIN_DIR%/debug}"

          PROFDATA="$(find "$BUILD_DIR" -type f -name "default.profdata" | head -n 1)"
          if [ -z "${PROFDATA:-}" ]; then
            echo "default.profdata not found under $BUILD_DIR"
            find "$BUILD_DIR" -type f -name "*.profdata" -print || true
            exit 1
          fi

          TEST_BIN="$(find "$BUILD_DIR" -type f -perm -111 \( -name "*PackageTests.xctest" -o -name "*Tests.xctest" -o -name "*Tests" \) | head -n 1)"
          if [ -z "${TEST_BIN:-}" ]; then
            echo "Test binary not found under $BUILD_DIR"
            find "$BUILD_DIR" -maxdepth 4 -type f -print | head -n 200 || true
            exit 1
          fi

          llvm-cov export \
            -format=json \
            -instr-profile "$PROFDATA" \
            "$TEST_BIN" > coverage-llvm.json

          python3 - <<'PY'
          import json
          import os
          import xml.etree.ElementTree as ET
          from collections import defaultdict

          workspace = os.environ.get("GITHUB_WORKSPACE", "")
          with open("coverage-llvm.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          root = ET.Element("coverage", version="1")
          files = (data.get("data") or [{}])[0].get("files", [])

          for fobj in files:
              path = fobj.get("filename")
              segments = fobj.get("segments", [])
              if not path or not segments:
                  continue

              if workspace:
                  abs_path = os.path.abspath(path)
                  ws = os.path.abspath(workspace)
                  if not abs_path.startswith(ws + os.sep):
                      continue
                  path = os.path.relpath(abs_path, ws)

              hits_by_line = defaultdict(int)
              for seg in segments:
                  line = seg[0]
                  count = seg[2]
                  has_count = seg[3]
                  if has_count:
                      hits_by_line[line] = max(hits_by_line[line], count)

              if not hits_by_line:
                  continue

              file_el = ET.SubElement(root, "file", path=path)
              for line in sorted(hits_by_line.keys()):
                  ET.SubElement(
                      file_el,
                      "lineToCover",
                      lineNumber=str(line),
                      covered="true" if hits_by_line[line] > 0 else "false",
                  )

          ET.ElementTree(root).write("coverage.xml", encoding="utf-8", xml_declaration=True)
          PY

      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.coverageReportPaths=coverage.xml
