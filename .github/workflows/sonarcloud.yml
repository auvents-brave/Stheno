name: SonarCloud
on: { push: { branches: [main] }, pull_request: {}, workflow_dispatch: {} }

concurrency:
  group: ci-${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04]
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: SwiftyLab/setup-swift@v1
        with:
          swift-version: "6.2.3"
          development: true

      - name: Build (same as linux.yml)
        run: swift build -c release

      - name: Test with coverage (linux)
        run: swift test --enable-code-coverage

       - name: Convert llvm-cov to Sonar generic coverage.xml
        shell: bash
        run: |
          set -euo pipefail

          BIN_DIR="$(swift build --show-bin-path)"
          BUILD_DIR="${BIN_DIR%/debug}"

          PROFDATA="$(find "$BUILD_DIR" -type f -name "default.profdata" | head -n 1)"
          TEST_BIN="$(find "$BUILD_DIR" -type f -perm -111 \( -name "*PackageTests.xctest" -o -name "*Tests.xctest" -o -name "*Tests" \) | head -n 1)"

          [ -n "${PROFDATA:-}" ] || { echo "default.profdata not found"; exit 1; }
          [ -n "${TEST_BIN:-}" ] || { echo "test binary not found"; exit 1; }

          llvm-cov export \
            -format=lcov \
            -instr-profile "$PROFDATA" \
            "$TEST_BIN" > coverage.lcov

          python3 - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from collections import defaultdict

          workspace = os.path.abspath(os.environ.get("GITHUB_WORKSPACE", "."))
          files = defaultdict(dict)
          current = None

          with open("coverage.lcov", "r", encoding="utf-8") as f:
              for raw in f:
                  line = raw.strip()
                  if line.startswith("SF:"):
                      p = line[3:]
                      ap = os.path.abspath(p)
                      if ap.startswith(workspace + os.sep):
                          current = os.path.relpath(ap, workspace)
                      else:
                          current = None
                  elif line.startswith("DA:") and current:
                      ln, hits = line[3:].split(",")[:2]
                      files[current][int(ln)] = max(files[current].get(int(ln), 0), int(hits))

          root = ET.Element("coverage", version="1")
          for path in sorted(files):
              file_el = ET.SubElement(root, "file", path=path)
              for ln in sorted(files[path]):
                  ET.SubElement(file_el, "lineToCover", lineNumber=str(ln), covered="true" if files[path][ln] > 0 else "false")

          ET.ElementTree(root).write("coverage.xml", encoding="utf-8", xml_declaration=True)
          PY

      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.coverageReportPaths=coverage.xml
