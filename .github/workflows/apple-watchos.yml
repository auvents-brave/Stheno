name: Apple watchOS
on: { push: { branches: [main] }, pull_request: {}, workflow_dispatch: {} }

concurrency:
  group: ci-${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - xcode-version: "26.3"
            macos-runner: "macos-26"
          - xcode-version: "15"
            macos-runner: "macos-14"
    uses: ./.github/workflows/_apple-sim-tests.yml
    with:
      workflow-name: "watchOS"
      scheme: "Stheno"
      sim-runtime-prefix: "com.apple.CoreSimulator.SimRuntime.watchOS"
      device-name-regex: "Apple Watch"
      xcode-version: ${{ matrix.xcode-version }}
      macos-runner: ${{ matrix.macos-runner }}
