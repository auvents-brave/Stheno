name: Apple Mac Catalyst
on: { push: { branches: [main] }, pull_request: {}, workflow_dispatch: {} }

permissions:
  contents: read

concurrency:
  group: ci-${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SWIFT_VERSION: "6.2.3"

jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"
      - name: Install Swiftly
        shell: bash
        run: |
          set -euo pipefail
          curl -L "https://download.swift.org/swiftly/darwin/swiftly.pkg" -o swiftly.pkg
          installer -pkg swiftly.pkg -target CurrentUserHomeDirectory
          ~/.swiftly/bin/swiftly init --assume-yes --skip-install
          . "${SWIFTLY_HOME_DIR:-$HOME/.swiftly}/env.sh"
          hash -r
          echo "${SWIFTLY_BIN_DIR}" >> "$GITHUB_PATH"
          swiftly install "${{ env.SWIFT_VERSION }}" --post-install-file=post-install.sh
          if [ -f post-install.sh ]; then
            . ./post-install.sh
          fi
          swiftly use "${{ env.SWIFT_VERSION }}"
          TOOLCHAIN_PATH="$(swiftly use --print-location)"
          TOOLCHAIN_ID="$(plutil -extract CFBundleIdentifier raw "$TOOLCHAIN_PATH/Info.plist")"
          echo "TOOLCHAINS=$TOOLCHAIN_ID" >> "$GITHUB_ENV"
      - name: Check Swift Version
        run: swift --version
      - name: Check Xcode Swift Toolchain
        run: xcrun --toolchain "$TOOLCHAINS" swift --version
      - run: xcodebuild -resolvePackageDependencies -scheme "Stheno" -toolchain "$TOOLCHAINS" "IDEPackageSupportToolchainOverrideForManifestLoading=$TOOLCHAINS"
      - run: xcodebuild test -scheme "Stheno" -toolchain "$TOOLCHAINS" "IDEPackageSupportToolchainOverrideForManifestLoading=$TOOLCHAINS" -destination "platform=macOS,variant=Mac Catalyst"
