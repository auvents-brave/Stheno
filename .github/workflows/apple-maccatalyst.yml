name: Apple Mac Catalyst
on: { push: { branches: [main] }, pull_request: {}, workflow_dispatch: {} }

permissions:
  contents: read

concurrency:
  group: ci-${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"
      - name: Check Swift Version
        run: swift --version
      - run: xcodebuild -resolvePackageDependencies -scheme "Stheno"
      - run: xcodebuild test -scheme "Stheno" -destination "platform=macOS,variant=Mac Catalyst"
