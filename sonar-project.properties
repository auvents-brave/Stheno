sonar.organization=auvents-brave
sonar.projectKey=auvents-brave_Stheno
sonar.projectName=Stheno
sonar.sourceEncoding=UTF-8

sonar.sources=Sources
sonar.tests=Tests
sonar.test.inclusions=Tests/**
sonar.exclusions=**/.build/**,**/.swiftpm/**,**/DerivedData/**

# Coverage-only exclusions: files whose code is gated behind `#if` blocks for
# platforms other than the SonarCloud Ubuntu runner.  On Linux their bodies
# don't compile, so their lines appear "uncovered" even though they are
# inactive code.  We keep them in `sonar.sources` so they are still scanned
# for bugs / code smells / security hotspots, but drop them from the
# coverage metric.
#   - BonjourDiscovery.swift  — Apple (NWBrowser) + Linux (Avahi) + Windows
#                               (DnsServiceBrowse) all in one file.
#   - InterceptingStdOut.swift — Darwin-only stdout interception via dup2.
sonar.coverage.exclusions=Sources/Stheno/BonjourDiscovery.swift,Sources/Stheno/InterceptingStdOut.swift

sonar.coverageReportPaths=coverage.xml
