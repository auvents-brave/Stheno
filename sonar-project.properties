sonar.organization=auvents-brave
sonar.projectKey=auvents-brave_Stheno
sonar.projectName=Stheno
sonar.sourceEncoding=UTF-8

sonar.sources=Sources
sonar.tests=Tests
sonar.test.inclusions=Tests/**
sonar.exclusions=**/.build/**,**/.swiftpm/**,**/DerivedData/**

# Coverage-only exclusions: files the SonarCloud Ubuntu runner can't exercise —
# either gated behind `#if` blocks for other platforms (so their bodies don't
# compile on Linux and read as "uncovered"), or pure network I/O with no
# deterministic branches to test. We keep them in `sonar.sources` so they are
# still scanned for bugs / code smells / security hotspots, but drop them from
# the coverage metric.
#   - Network/BonjourDiscovery.swift — Apple (NWBrowser) + Linux (Avahi) +
#                                Windows (DnsServiceBrowse) all in one file.
#   - Network/URLFetcher.swift — a thin URLSession wrapper; its branches are
#                                network I/O the runner can't reach offline.
#   - InterceptingStdOut.swift — Darwin-only stdout interception via dup2.
#   - Color+HTML.swift         — the bulk is UIKit / AppKit / SwiftUI bridging
#                                that doesn't compile on Linux; only the small
#                                Foundation-free fallback is active there.
#   - DomainResolver+Apple.swift / +Windows.swift — the Darwin and Windows
#                                `getaddrinfo` variants; the Linux variant and the
#                                shared surface (DomainResolver.swift) stay covered.
sonar.coverage.exclusions=Sources/Stheno/Network/BonjourDiscovery.swift,Sources/Stheno/Network/URLFetcher.swift,Sources/Stheno/InterceptingStdOut.swift,Sources/Stheno/Color+HTML.swift,Sources/Stheno/Network/DomainResolver/DomainResolver+Apple.swift,Sources/Stheno/Network/DomainResolver/DomainResolver+Windows.swift

# Copy-paste-detector exclusions: the per-platform `getaddrinfo` wrappers
# (+Apple / +Linux / +Windows) necessarily share the same `getnameinfo` loop —
# Darwin, Glibc and WinSDK expose the same C API with only small type
# differences (e.g. `ai_socktype`), so the duplication is intentional and not
# worth abstracting across the platform boundary. Drop them from the
# duplication metric (they already sit out of the coverage metric above).
sonar.cpd.exclusions=Sources/Stheno/Network/DomainResolver/DomainResolver+Apple.swift,Sources/Stheno/Network/DomainResolver/DomainResolver+Linux.swift,Sources/Stheno/Network/DomainResolver/DomainResolver+Windows.swift

sonar.coverageReportPaths=coverage.xml
